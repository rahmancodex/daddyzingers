<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Daddy Zinger</title>
    <meta name="theme-color" content="#0f0f0e" />
    <style>
      html,body{margin:0;padding:0;height:100%;background:#0f0f0e;color:#fafafa;font-family:Inter,system-ui,sans-serif}
      .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
      h1{font-size:2rem;margin:0 0 8px;font-weight:700}
      p{color:#a1a1aa;margin:0 0 24px;max-width:32rem}
      button{background:#fafafa;color:#0f0f0e;border:0;border-radius:12px;padding:12px 20px;font-weight:600;cursor:pointer}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div>
        <h1>You're offline</h1>
        <p>We can't reach our servers right now. Check your connection and try again.</p>
        <button onclick="location.reload()">Retry</button>
      </div>
    </div>
  </body>
</html>
